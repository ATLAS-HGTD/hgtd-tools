workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "push"

stages:
  - build
  - test
  - deploy_docs
  - deploy_zenodo

pre-commit:
  stage: build
  image: registry.cern.ch/docker.io/library/python:3.12
  script:
    - pip install pre-commit
    - pre-commit run --all-files
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never

api_report:
  stage: test
  trigger:
    project: anstein/hgtd-tools-internal
    branch: master
    strategy: mirror
  variables:
    TRIGGER_TARGET: "api_report_generate_files"
  rules:
    # Run on schedules
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Run on pushes to the default branch (main or master)
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

api_test:
  stage: test
  trigger:
    project: anstein/hgtd-tools-internal
    branch: master
    strategy: depend
  variables:
    TRIGGER_TARGET: "api_test_generate_files"
    UPSTREAM_MR_BRANCH: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    UPSTREAM_PROJECT_URL: $CI_MERGE_REQUEST_SOURCE_PROJECT_URL
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.job-script: &job-script
  - pip install zensical
  - zensical build --clean

pages:
  stage: deploy_docs
  image: registry.cern.ch/docker.io/library/python:latest
  script: [*job-script, "if [[ -f _redirects ]]; then cp _redirects public; fi;"]
  artifacts:
    paths:
      - public
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

prepare_zenodo:
  stage: deploy_zenodo
  rules:
    # Never run on forks
    - if: '$CI_PROJECT_NAMESPACE != "anstein"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+/'
      when: on_success
    - when: never
  script:
    - git archive --output hgtd-tools_${CI_COMMIT_TAG}.zip --format zip
    # Update publication settings
    - sed -i -e "s/<<DATE>>/$(date +%F)/g" .zenodo.json
    - sed -i -e "s/<<VERSION>>/${CI_COMMIT_TAG}/g" .zenodo.json
    - sed -i -e "s/<<VERSION_STRIPPED>>/${CI_COMMIT_TAG#v}/g" .zenodo.json
    - git diff .zenodo.json
  artifacts:
    paths:
      - "hgtd-tools_${CI_COMMIT_TAG}.zip"
      - .zenodo.json
    expire_in: 1 day

upload_zenodo:
  stage: deploy_zenodo
  needs:
    - job: prepare_zenodo
      artifacts: false
      optional: true
  variables:
    VERSION: latest
    HGTDTOOLS_PROJECT_PATH: '$CI_PROJECT_PATH'
    HGTDTOOLS_PROJECT_BRANCH: '$CI_COMMIT_REF_NAME'
    HGTDTOOLS_PROJECT_ISTAG: 'false'
  rules:
    # Never run on forks or merge requests
    - if: '$CI_PROJECT_NAMESPACE != "anstein"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    # Only run on tags with vX.Y.Z, not other ones
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+/'
      variables:
        VERSION: $CI_COMMIT_TAG
        HGTDTOOLS_PROJECT_ISTAG: true
      when: on_success
    - when: never
  trigger:
    project: anstein/hgtd-tools-internal
    branch: master
    strategy: mirror
